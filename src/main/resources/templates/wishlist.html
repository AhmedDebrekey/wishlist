<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${wishlist.title}">Wishlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f9fafb; --surface: #ffffff; --border: #e5e7eb;
            --text: #111827; --muted: #6b7280; --faint: #9ca3af;
            --accent: #6366f1; --accent-h: #4f46e5; --accent-light: #eef2ff;
            --green: #10b981; --green-light: #d1fae5;
            --red: #ef4444; --red-light: #fee2e2;
            --radius: 10px; --radius-sm: 6px;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }
        a { color: inherit; text-decoration: none; }

        .navbar { background: #111827; color: white; height: 52px; position: sticky; top: 0; z-index: 100; }
        .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; height: 100%; display: flex; align-items: center; justify-content: space-between; }
        .nav-brand { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; }
        .nav-back { font-size: 13px; color: rgba(255,255,255,0.6); transition: color 0.15s; }
        .nav-back:hover { color: white; }

        .page { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

        .alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; margin-bottom: 1.5rem; }
        .alert--success { background: var(--green-light); color: #065f46; }
        .alert--error { background: var(--red-light); color: #991b1b; }

        .page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
        .page-title h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
        .page-meta { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
        .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
        .dot { color: var(--faint); }
        .badge { background: var(--accent-light); color: var(--accent); font-size: 11.5px; font-weight: 600; padding: 4px 12px; border-radius: 100px; white-space: nowrap; align-self: center; }

        .layout { display: grid; grid-template-columns: 1fr 300px; gap: 2rem; align-items: start; }
        @media(max-width:768px){ .layout { grid-template-columns: 1fr; } .sidebar { order: -1; } }

        .sidebar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; position: sticky; top: 68px; }
        .sidebar h2 { font-size: 15px; font-weight: 600; margin-bottom: 1.25rem; }

        .form { display: flex; flex-direction: column; gap: 14px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 11.5px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .hint { font-weight: 400; color: var(--faint); text-transform: none; letter-spacing: 0; font-size: 11px; }
        .field input { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 11px; font-family: 'Inter', sans-serif; font-size: 13.5px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s, box-shadow 0.15s; width: 100%; }
        .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); background: white; }
        .field input::placeholder { color: var(--faint); }
        .btn-primary { display: flex; align-items: center; justify-content: center; width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 500; cursor: pointer; margin-top: 4px; transition: background 0.15s; }
        .btn-primary:hover { background: var(--accent-h); }

        .wish-list { display: flex; flex-direction: column; gap: 10px; }

        .wish-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; transition: opacity 0.15s; }
        .wish-card--reserved { opacity: 0.45; }
        .wish-left { flex: 1; min-width: 0; }
        .wish-name { font-size: 14.5px; font-weight: 600; margin-bottom: 2px; }
        .wish-desc { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
        .wish-footer { display: flex; align-items: center; gap: 12px; }
        .wish-price { font-size: 13px; font-weight: 500; }
        .wish-link { font-size: 12.5px; color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
        .wish-link:hover { opacity: 0.7; }
        .wish-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

        .reserved-tag { font-size: 11px; font-weight: 600; background: var(--green-light); color: #065f46; padding: 2px 8px; border-radius: 100px; white-space: nowrap; }

        .btn { display: inline-flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; font-size: 12.5px; padding: 5px 11px; transition: all 0.15s; white-space: nowrap; border: 1px solid transparent; }
        .btn-outline { background: transparent; border-color: var(--border); color: var(--muted); }
        .btn-outline:hover { border-color: var(--green); color: #065f46; background: var(--green-light); }
        .btn-reserved { background: var(--green-light); color: #065f46; }
        .btn-reserved:hover { background: var(--green); color: white; }
        .btn-ghost { background: transparent; color: var(--faint); }
        .btn-ghost:hover { color: var(--red); background: var(--red-light); }

        .empty { background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); padding: 3rem 2rem; text-align: center; color: var(--faint); font-size: 13px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-inner">
        <div class="nav-brand">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            Wishlist
        </div>
        <a th:href="@{/}" class="nav-back">← All wishlists</a>
    </div>
</nav>

<div class="page">

    <div th:if="${successMessage}" class="alert alert--success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert--error" th:text="${errorMessage}"></div>

    <div class="page-header">
        <div class="page-title">
            <h1 th:text="${wishlist.title}">Wishlist title</h1>
            <div class="page-meta">
                <div class="avatar" th:text="${#strings.substring(wishlist.ownerName, 0, 1).toUpperCase()}">A</div>
                <span th:text="${wishlist.ownerName}">Owner</span>
                <span class="dot" th:if="${wishlist.description != null and !#strings.isEmpty(wishlist.description)}">·</span>
                <span th:if="${wishlist.description != null and !#strings.isEmpty(wishlist.description)}" th:text="${wishlist.description}">Description</span>
            </div>
        </div>
        <span class="badge"><span th:text="${#lists.size(wishlist.wishes)}">0</span> wishes</span>
    </div>

    <div class="layout">
        <section>
            <div th:if="${#lists.isEmpty(wishlist.wishes)}" class="empty">
                No wishes yet — add one using the form!
            </div>

            <div class="wish-list" th:unless="${#lists.isEmpty(wishlist.wishes)}">
                <div th:each="wish : ${wishlist.wishes}"
                     class="wish-card"
                     th:classappend="${wish.reserved} ? ' wish-card--reserved' : ''">

                    <div class="wish-left">
                        <div class="wish-name" th:text="${wish.name}">Wish name</div>
                        <div class="wish-desc"
                             th:if="${wish.description != null and !#strings.isEmpty(wish.description)}"
                             th:text="${wish.description}">Description</div>
                        <div class="wish-footer">
                            <span class="wish-price" th:if="${wish.price != null}" th:text="${wish.price} + ' kr'">0 kr</span>
                            <a class="wish-link"
                               th:if="${wish.link != null and !#strings.isEmpty(wish.link)}"
                               th:href="${wish.link}" target="_blank">View item →</a>
                        </div>
                    </div>

                    <div class="wish-actions">
                        <span class="reserved-tag" th:if="${wish.reserved}">Reserved</span>
                        <form th:action="@{/wishlist/{wlId}/wish/{wId}/reserve(wlId=${wishlist.id}, wId=${wish.id})}" method="post">
                            <button type="submit" class="btn"
                                    th:classappend="${wish.reserved} ? ' btn-reserved' : ' btn-outline'"
                                    th:text="${wish.reserved} ? 'Unreserve' : 'Reserve'">Reserve</button>
                        </form>
                        <form th:action="@{/wishlist/{wlId}/wish/{wId}/delete(wlId=${wishlist.id}, wId=${wish.id})}" method="post">
                            <button type="submit" class="btn btn-ghost" onclick="return confirm('Remove this wish?')">Remove</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <aside class="sidebar">
            <h2>Add a wish</h2>
            <form th:action="@{/wishlist/{id}/wish/create(id=${wishlist.id})}" th:object="${wish}" method="post" class="form">
                <div class="field">
                    <label for="name">Name</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="e.g. Blue sneakers" required>
                </div>
                <div class="field">
                    <label for="description">Description <span class="hint">optional</span></label>
                    <input type="text" id="description" th:field="*{description}" placeholder="Any details...">
                </div>
                <div class="field">
                    <label for="price">Price (kr) <span class="hint">optional</span></label>
                    <input type="number" step="0.01" id="price" th:field="*{price}" placeholder="0.00">
                </div>
                <div class="field">
                    <label for="link">Link <span class="hint">optional</span></label>
                    <input type="text" id="link" th:field="*{link}" placeholder="youtube.com or https://...">
                </div>
                <button type="submit" class="btn-primary">Add wish</button>
            </form>
        </aside>
    </div>
</div>

</body>
</html>

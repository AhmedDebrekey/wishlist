<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f9fafb; --surface: #ffffff; --border: #e5e7eb;
            --text: #111827; --muted: #6b7280; --faint: #9ca3af;
            --accent: #6366f1; --accent-h: #4f46e5; --accent-light: #eef2ff;
            --green: #10b981; --green-light: #d1fae5;
            --red: #ef4444; --red-light: #fee2e2;
            --radius: 10px; --radius-sm: 6px;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }
        a { color: inherit; text-decoration: none; }

        .navbar { background: #111827; color: white; height: 52px; position: sticky; top: 0; z-index: 100; }
        .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; height: 100%; display: flex; align-items: center; }
        .nav-brand { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; }

        .page { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

        .alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; margin-bottom: 1.5rem; }
        .alert--success { background: var(--green-light); color: #065f46; }
        .alert--error { background: var(--red-light); color: #991b1b; }

        .layout { display: grid; grid-template-columns: 300px 1fr; gap: 2rem; align-items: start; }
        @media(max-width:768px){ .layout { grid-template-columns: 1fr; } }

        .sidebar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; position: sticky; top: 68px; }
        .sidebar h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .sidebar p { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; }

        .form { display: flex; flex-direction: column; gap: 14px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 11.5px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .hint { font-weight: 400; color: var(--faint); text-transform: none; letter-spacing: 0; font-size: 11px; }
        .field input { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 11px; font-family: 'Inter', sans-serif; font-size: 13.5px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s, box-shadow 0.15s; width: 100%; }
        .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); background: white; }
        .field input::placeholder { color: var(--faint); }

        .btn-primary { display: flex; align-items: center; justify-content: center; width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 500; cursor: pointer; margin-top: 4px; transition: background 0.15s; }
        .btn-primary:hover { background: var(--accent-h); }

        .main { min-width: 0; }
        .main-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
        .main-header h2 { font-size: 16px; font-weight: 600; }
        .badge { background: var(--accent-light); color: var(--accent); font-size: 11.5px; font-weight: 600; padding: 2px 8px; border-radius: 100px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; transition: box-shadow 0.15s, transform 0.15s; }
        .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-2px); }
        .card-body { padding: 1.25rem; flex: 1; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; }
        .card-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
        .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
        .card-owner { font-size: 12px; color: var(--muted); font-weight: 500; }
        .card-title { font-size: 15px; font-weight: 600; line-height: 1.3; }
        .card-desc { font-size: 12.5px; color: var(--muted); }
        .card-count { font-size: 12px; color: var(--faint); margin-top: 4px; }
        .card-footer { padding: 0.65rem 1.25rem; display: flex; justify-content: flex-end; }
        .btn-delete { background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 12.5px; color: var(--faint); transition: color 0.15s; padding: 0; }
        .btn-delete:hover { color: var(--red); }

        .empty { background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); padding: 3rem 2rem; text-align: center; color: var(--faint); font-size: 13px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-inner">
        <div class="nav-brand">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            Wishlist
        </div>
    </div>
</nav>

<div class="page">

    <div th:if="${successMessage}" class="alert alert--success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert--error" th:text="${errorMessage}"></div>

    <div class="layout">
        <aside class="sidebar">
            <h1>Create a wishlist</h1>
            <p>Share your wishes with friends and family.</p>
            <form th:action="@{/wishlist/create}" th:object="${wishlist}" method="post" class="form">
                <div class="field">
                    <label for="ownerName">Your name</label>
                    <input type="text" id="ownerName" th:field="*{ownerName}" placeholder="e.g. Ahmed" required>
                </div>
                <div class="field">
                    <label for="title">Wishlist title</label>
                    <input type="text" id="title" th:field="*{title}" placeholder="e.g. Birthday 2026" required>
                </div>
                <div class="field">
                    <label for="description">Description <span class="hint">optional</span></label>
                    <input type="text" id="description" th:field="*{description}" placeholder="Add a short note...">
                </div>
                <button type="submit" class="btn-primary">Create wishlist</button>
            </form>
        </aside>

        <main class="main">
            <div class="main-header">
                <h2>All wishlists</h2>
                <span class="badge" th:text="${#lists.size(wishlists)}">0</span>
            </div>

            <div th:if="${#lists.isEmpty(wishlists)}" class="empty">
                No wishlists yet — create your first one!
            </div>

            <div class="grid" th:unless="${#lists.isEmpty(wishlists)}">
                <div th:each="wishlist : ${wishlists}" class="card">
                    <a th:href="@{/wishlist/{id}(id=${wishlist.id})}" class="card-body">
                        <div class="card-meta">
                            <div class="avatar" th:text="${#strings.substring(wishlist.ownerName, 0, 1).toUpperCase()}">A</div>
                            <span class="card-owner" th:text="${wishlist.ownerName}">Owner</span>
                        </div>
                        <div class="card-title" th:text="${wishlist.title}">Title</div>
                        <div class="card-desc"
                             th:if="${wishlist.description != null and !#strings.isEmpty(wishlist.description)}"
                             th:text="${wishlist.description}">Description</div>
                        <div class="card-count">
                            <span th:text="${#lists.size(wishlist.wishes)}">0</span> wish<span th:if="${#lists.size(wishlist.wishes) != 1}">es</span>
                        </div>
                    </a>
                    <div class="card-footer">
                        <form th:action="@{/wishlist/{id}/delete(id=${wishlist.id})}" method="post">
                            <button type="submit" class="btn-delete" onclick="return confirm('Delete this wishlist?')">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

</body>
</html>
